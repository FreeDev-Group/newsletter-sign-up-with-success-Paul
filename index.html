<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>
  </head>
  <body>
    <div class="card">
      <div class="sign-up">
        <h1>Stay updated!</h1>

        <p class="paragraph">Join 60,000+ product managers receiving monthly updates on:</p>

        <div class="offers">

          <div class="offer_1">
            <img src="assets/images/icon-list.svg" alt="icon-list" />
            <p>Product discovery and building what matters</p>
          </div>
          <div class="offer_2">
            <img src="assets/images/icon-list.svg" alt="icon-list" />
            <p>Measuring to ensure updates are a success</p>
          </div>
          <div class="offer_3">
            <img src="assets/images/icon-list.svg" alt="icon-list" />
            <p>And much more !</p>
          </div>

        </div>

        <form action="">
          <label for="email">Email address</label>
          <br>
          <input type="email" id="email" placeholder="email@company.com" />
          <input type="submit" id="submit" value="Subscribe to monthly newsletter" />
        </form>

        <!-- Success message start -->

        <!-- Thanks for subscribing! A confirmation email has been sent to
        ash@loremcompany.com. Please open it and click the button inside to
        confirm your subscription. Dismiss message -->
      </div>

      
        <div class="img_hover">
          <img
          src="assets/images/illustration-sign-up-desktop.svg"
          alt="illustration sign-up"
          />
        </div>
      </div>
    </div>

    <!-- Success message end -->

    <div class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
        >Frontend Mentor</a
      >. Coded by
      <a href="#" target="_blank" rel="noopener noreferrer">Paul AFUMBA</a>.
    </div>
  </body>
</html>
